<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>盤況總覽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --border: #1e2a38;
    --text: #e8edf2;
    --muted: #4a6070;
    --up: #00d084;
    --down: #ff4d6a;
    --flat: #7a9bb5;
    --accent: #1d8cff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header-title {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 400;
  }

  .session-badge {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    border: 1px solid;
  }
  .session-badge.night { color:#a78bfa; border-color:#a78bfa44; background:#a78bfa11; }
  .session-badge.day   { color:#fbbf24; border-color:#fbbf2444; background:#fbbf2411; }
  .session-badge.closed{ color:var(--muted); border-color:var(--muted); background:transparent; }

  .section-label {
    width: 100%;
    max-width: 360px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
    margin: 20px 0 8px;
    padding-left: 4px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 14px 14px 0 0;
  }
  .card.up::before    { background: var(--up); }
  .card.down::before  { background: var(--down); }
  .card.flat::before  { background: var(--flat); }
  .card.loading::before { background: var(--border); }

  .card-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .card-main {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .price {
    font-size: 30px;
    font-weight: 700;
    font-family: 'Inter', monospace;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .price.loading-text {
    color: var(--border);
    animation: pulse 1.4s ease-in-out infinite;
  }

  .change-group { text-align: right; }

  .change-pct {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Inter', monospace;
    line-height: 1;
  }

  .change-abs {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    font-family: 'Inter', monospace;
  }

  .card.up .price, .card.up .change-pct   { color: var(--up); }
  .card.down .price, .card.down .change-pct { color: var(--down); }
  .card.flat .price, .card.flat .change-pct { color: var(--flat); }
  .card.loading .price { color: var(--border); }

  .card-footer {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  .footer-item { text-align: center; }

  .footer-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }

  .footer-val {
    font-size: 12px;
    font-family: 'Inter', monospace;
    color: var(--text);
    font-weight: 500;
  }

  .refresh-btn {
    margin-top: 24px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 28px;
    border-radius: 99px;
    font-size: 13px;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .refresh-btn:active { transform: scale(0.97); }

  .last-update {
    margin-top: 14px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  .error-msg {
    color: var(--down);
    font-size: 11px;
    margin-top: 6px;
    text-align: center;
  }

  .spinning { display: inline-block; animation: spin 1s linear infinite; }

  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.7} }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">盤況總覽</div>
  <div class="session-badge" id="sessionBadge">載入中</div>
</div>

<!-- 台灣 -->
<div class="section-label">🇹🇼 台灣</div>
<div class="cards">
  <div class="card loading" id="card-twii">
    <div class="card-label">加權指數</div>
    <div class="card-main">
      <div class="price loading-text" id="price-twii">—</div>
      <div class="change-group">
        <div class="change-pct" id="pct-twii">—%</div>
        <div class="change-abs" id="abs-twii">—</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-item"><div class="footer-label">開盤</div><div class="footer-val" id="open-twii">—</div></div>
      <div class="footer-item"><div class="footer-label">最高</div><div class="footer-val" id="high-twii">—</div></div>
      <div class="footer-item"><div class="footer-label">最低</div><div class="footer-val" id="low-twii">—</div></div>
      <div class="footer-item"><div class="footer-label">昨收</div><div class="footer-val" id="prev-twii">—</div></div>
    </div>
  </div>

  <div class="card loading" id="card-fut">
    <div class="card-label">台指期（含夜盤）</div>
    <div class="card-main">
      <div class="price loading-text" id="price-fut">—</div>
      <div class="change-group">
        <div class="change-pct" id="pct-fut">—%</div>
        <div class="change-abs" id="abs-fut">—</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-item"><div class="footer-label">開盤</div><div class="footer-val" id="open-fut">—</div></div>
      <div class="footer-item"><div class="footer-label">最高</div><div class="footer-val" id="high-fut">—</div></div>
      <div class="footer-item"><div class="footer-label">最低</div><div class="footer-val" id="low-fut">—</div></div>
      <div class="footer-item"><div class="footer-label">昨收</div><div class="footer-val" id="prev-fut">—</div></div>
    </div>
  </div>
</div>

<!-- 美國 -->
<div class="section-label">🇺🇸 美國</div>
<div class="cards">
  <div class="card loading" id="card-sp500">
    <div class="card-label">S&amp;P 500</div>
    <div class="card-main">
      <div class="price loading-text" id="price-sp500">—</div>
      <div class="change-group">
        <div class="change-pct" id="pct-sp500">—%</div>
        <div class="change-abs" id="abs-sp500">—</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-item"><div class="footer-label">開盤</div><div class="footer-val" id="open-sp500">—</div></div>
      <div class="footer-item"><div class="footer-label">最高</div><div class="footer-val" id="high-sp500">—</div></div>
      <div class="footer-item"><div class="footer-label">最低</div><div class="footer-val" id="low-sp500">—</div></div>
      <div class="footer-item"><div class="footer-label">昨收</div><div class="footer-val" id="prev-sp500">—</div></div>
    </div>
  </div>

  <div class="card loading" id="card-nasdaq">
    <div class="card-label">那斯達克 Nasdaq</div>
    <div class="card-main">
      <div class="price loading-text" id="price-nasdaq">—</div>
      <div class="change-group">
        <div class="change-pct" id="pct-nasdaq">—%</div>
        <div class="change-abs" id="abs-nasdaq">—</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-item"><div class="footer-label">開盤</div><div class="footer-val" id="open-nasdaq">—</div></div>
      <div class="footer-item"><div class="footer-label">最高</div><div class="footer-val" id="high-nasdaq">—</div></div>
      <div class="footer-item"><div class="footer-label">最低</div><div class="footer-val" id="low-nasdaq">—</div></div>
      <div class="footer-item"><div class="footer-label">昨收</div><div class="footer-val" id="prev-nasdaq">—</div></div>
    </div>
  </div>

  <div class="card loading" id="card-dow">
    <div class="card-label">道瓊 Dow Jones</div>
    <div class="card-main">
      <div class="price loading-text" id="price-dow">—</div>
      <div class="change-group">
        <div class="change-pct" id="pct-dow">—%</div>
        <div class="change-abs" id="abs-dow">—</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-item"><div class="footer-label">開盤</div><div class="footer-val" id="open-dow">—</div></div>
      <div class="footer-item"><div class="footer-label">最高</div><div class="footer-val" id="high-dow">—</div></div>
      <div class="footer-item"><div class="footer-label">最低</div><div class="footer-val" id="low-dow">—</div></div>
      <div class="footer-item"><div class="footer-label">昨收</div><div class="footer-val" id="prev-dow">—</div></div>
    </div>
  </div>

  <div class="card loading" id="card-sox">
    <div class="card-label">費城半導體 SOX</div>
    <div class="card-main">
      <div class="price loading-text" id="price-sox">—</div>
      <div class="change-group">
        <div class="change-pct" id="pct-sox">—%</div>
        <div class="change-abs" id="abs-sox">—</div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-item"><div class="footer-label">開盤</div><div class="footer-val" id="open-sox">—</div></div>
      <div class="footer-item"><div class="footer-label">最高</div><div class="footer-val" id="high-sox">—</div></div>
      <div class="footer-item"><div class="footer-label">最低</div><div class="footer-val" id="low-sox">—</div></div>
      <div class="footer-item"><div class="footer-label">昨收</div><div class="footer-val" id="prev-sox">—</div></div>
    </div>
  </div>
</div>

<button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ 重新整理</button>
<div class="last-update" id="lastUpdate"></div>
<div class="error-msg" id="errorMsg"></div>

<script>
  // 各指數代號
  const SYMBOLS = [
    { id: 'twii',   sym: '%5ETWII',   label: '加權指數' },
    { id: 'fut',    sym: 'WTX%26',    label: '台指期',  fallbacks: ['IX0126.TW'] },
    { id: 'sp500',  sym: '%5EGSPC',   label: 'S&P 500' },
    { id: 'nasdaq', sym: '%5EIXIC',   label: 'Nasdaq' },
    { id: 'dow',    sym: '%5EDJI',    label: 'Dow Jones' },
    { id: 'sox',    sym: '%5ESOX',    label: 'SOX' },
  ];

  function fmt(n, dec = 2) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
  }

  function getSession() {
    const twNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
    const total = twNow.getHours() * 60 + twNow.getMinutes();
    const day = twNow.getDay();
    if (day === 0 || day === 6) return 'closed';
    if (total >= 540 && total <= 825) return 'day';
    if (total >= 900 || total <= 300) return 'night';
    return 'closed';
  }

  function updateSessionBadge() {
    const s = getSession();
    const badge = document.getElementById('sessionBadge');
    const map = {
      day:    ['日盤進行中', 'day'],
      night:  ['夜盤進行中', 'night'],
      closed: ['休市中',    'closed'],
    };
    badge.textContent = map[s][0];
    badge.className = 'session-badge ' + map[s][1];
  }

  // 儲存加權指數昨收，供台指期換算用
  let twiiPrevClose = null;

  function applyCard(id, data) {
    const card = document.getElementById('card-' + id);
    const meta = data?.chart?.result?.[0]?.meta;
    if (!meta) return;

    let price  = meta.regularMarketPrice;
    let prev   = meta.chartPreviousClose;
    let open   = meta.regularMarketOpen   ?? price;
    let high   = meta.regularMarketDayHigh ?? price;
    let low    = meta.regularMarketDayLow  ?? price;

    // 台指期動態換算：用加權指數昨收 / IX0126昨收 算出當日係數
    if (id === 'fut' && twiiPrevClose && prev) {
      const ratio = twiiPrevClose / prev;
      price = price * ratio;
      prev  = prev  * ratio;
      open  = open  * ratio;
      high  = high  * ratio;
      low   = low   * ratio;
    }

    // 若是加權指數，記錄昨收
    if (id === 'twii') {
      twiiPrevClose = meta.chartPreviousClose;
    }

    const change = price - prev;
    const pct    = (change / prev) * 100;
    const dir    = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
    const sign   = change >= 0 ? '+' : '';

    card.className = `card ${dir}`;
    const priceEl = document.getElementById('price-' + id);
    priceEl.textContent = fmt(price, 2);
    priceEl.classList.remove('loading-text');
    document.getElementById('pct-'  + id).textContent = `${sign}${fmt(pct, 2)}%`;
    document.getElementById('abs-'  + id).textContent = `${sign}${fmt(change, 2)}`;
    document.getElementById('open-' + id).textContent = fmt(open, 0);
    document.getElementById('high-' + id).textContent = fmt(high, 0);
    document.getElementById('low-'  + id).textContent = fmt(low,  0);
    document.getElementById('prev-' + id).textContent = fmt(prev, 0);
  }

  async function fetchQuote(symbol) {
    const ts = Date.now();
    const proxies = [
      `https://yahoo-proxy.tomhsu8338.workers.dev/?symbol=${symbol}&_=${ts}`,
      `https://corsproxy.io/?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d&_=${ts}`)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d&_=${ts}`)}`,
    ];
    for (const url of proxies) {
      try {
        const res = await fetch(url, { headers: { Accept: 'application/json' } });
        if (!res.ok) continue;
        const data = JSON.parse(await res.text());
        if (data?.chart?.result?.[0]) return data;
      } catch { continue; }
    }
    return null;
  }

  async function loadOne(item) {
    let data = await fetchQuote(item.sym);
    if (!data && item.fallbacks) {
      for (const fb of item.fallbacks) {
        data = await fetchQuote(fb);
        if (data) break;
      }
    }
    if (data) applyCard(item.id, data);
  }

  async function loadAll() {
    document.getElementById('errorMsg').textContent = '';
    document.getElementById('refreshBtn').innerHTML = '<span class="spinning">↻</span> 更新中';
    document.getElementById('refreshBtn').disabled = true;
    updateSessionBadge();

    // 先抓加權指數，設好換算基準，再抓其他
    await loadOne(SYMBOLS.find(s => s.id === 'twii'));
    await Promise.all(SYMBOLS.filter(s => s.id !== 'twii').map(loadOne));

    const twStr = new Date().toLocaleString('zh-TW', {
      timeZone: 'Asia/Taipei',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
    document.getElementById('lastUpdate').textContent = `最後更新：${twStr}`;
    document.getElementById('refreshBtn').innerHTML = '↻ 重新整理';
    document.getElementById('refreshBtn').disabled = false;
  }

  loadAll();
</script>
</body>
</html>
